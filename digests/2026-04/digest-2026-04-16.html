<script>
const BADGES = {
    'FDA+':'bg-red-50 text-red-700 border-red-200',
    'Quality/Compliance':'bg-rose-100 text-rose-800 border-rose-300',
    'Deals':'bg-green-50 text-green-700 border-green-200',
    'Clinical':'bg-blue-50 text-blue-700 border-blue-200',
    'Financing':'bg-purple-50 text-purple-700 border-purple-200',
    'Strategy':'bg-indigo-50 text-indigo-700 border-indigo-200',
    'Product':'bg-violet-50 text-violet-700 border-violet-200',
    'Productivity':'bg-amber-50 text-amber-700 border-amber-200',
    'AI':'bg-cyan-50 text-cyan-700 border-cyan-200',
    'Leadership':'bg-pink-50 text-pink-700 border-pink-200',
    'Policy':'bg-orange-50 text-orange-700 border-orange-200',
    'Pipeline':'bg-teal-50 text-teal-700 border-teal-200'
};
const COLS = {
    pharma:   {label:'Pharma',                 dot:'bg-red-500',    sources:'Endpoints News, BioPharma Dive, PDA'},
    ai:       {label:'AI',                     dot:'bg-cyan-500',   sources:'Import AI, The Batch, AI Maker'},
    strategy: {label:'Strategy &amp; Leadership', dot:'bg-indigo-500', sources:'HBR, Leadership in Change, Dept of Product, Ali Abdaal'}
};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
    const D=JSON.parse(document.getElementById('digestData').textContent);
    document.title='Daily Digest \u2014 '+D.shortDate;
    const groups={pharma:[],ai:[],strategy:[]};
    D.articles.forEach(a=>(groups[a.column]||[]).push(a));

    let h='<div class="bg-gradient-to-r from-[#482A77] to-[#6B4A9E] text-white px-4 py-5 mb-4"><div class="max-w-7xl mx-auto">';
    h+='<h1 class="text-xl font-bold">Daily Digest</h1>';
    h+='<p class="text-purple-200 text-sm mt-1">'+D.displayDate+'</p>';
    h+='<p class="text-purple-200 text-xs mt-1">&#10004; 24hr filter active | Emails received since '+D.cutoffTime+'</p>';
    if(D.lightNewsDay) h+='<p class="text-yellow-300 text-xs mt-1">Light news day &mdash; '+D.articleCount+' articles within 24hr window</p>';
    h+='<div class="flex gap-3 mt-2 text-xs text-purple-200"><span>'+D.articleCount+' articles</span><span>&middot;</span><span>'+D.sourceCount+' sources</span><span>&middot;</span><span>'+D.domainCount+' domains</span></div>';
    h+='</div></div>';

    h+='<div class="max-w-7xl mx-auto px-4"><div class="grid grid-cols-1 lg:grid-cols-3 gap-6">';
    for(const[key,cfg]of Object.entries(COLS)){
        const arts=groups[key]||[];
        h+='<div><div class="sticky top-0 bg-gray-50 pt-2 pb-3 z-10">';
        h+='<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full '+cfg.dot+' inline-block"></span>';
        h+='<h2 class="text-sm font-semibold text-gray-800">'+cfg.label+'</h2></div>';
        h+='<p class="text-xs text-gray-500 pl-5">'+cfg.sources+' &middot; '+arts.length+' article'+(arts.length!==1?'s':'')+'</p></div>';
        if(!arts.length){h+='<p class="text-xs text-gray-400 italic px-1 pt-2">No articles today</p>';}
        else arts.forEach(a=>{
            const bc=BADGES[a.category]||'bg-gray-50 text-gray-700 border-gray-200';
            h+='<div class="article-card bg-white rounded-lg p-3 mb-2 border border-gray-200 shadow-sm">';
            h+='<label class="flex items-start gap-3 cursor-pointer">';
            h+='<input type="checkbox" class="mt-1 w-4 h-4" data-agent="'+a.agent+'" data-title="'+esc(a.title)+'" data-source="'+esc(a.source)+'" data-url="'+esc(a.url)+'" data-category="'+a.category+'" onchange="updateCount()">';
            h+='<div class="flex-1"><div class="flex flex-wrap gap-1 mb-1">';
            h+='<span class="text-xs px-2 py-0.5 rounded border '+bc+'">'+a.category+'</span>';
            h+='<span class="text-xs text-gray-400">'+esc(a.source)+'</span></div>';
            h+='<p class="text-sm font-medium text-gray-900">'+esc(a.title)+'</p>';
            h+='<p class="text-xs text-gray-600 mt-1">'+esc(a.summary)+'</p>';
            h+='<div class="flex items-center justify-between mt-2">';
            h+='<span class="text-xs text-gray-500">'+a.time+'</span>';
            h+='<a href="'+a.url+'" target="_blank" class="text-xs bg-[#482A77] text-white px-3 py-1 rounded hover:bg-[#6B4A9E]">Read &rarr;</a>';
            h+='</div></div></label></div>';
        });
        h+='</div>';
    }
    h+='</div>';

    h+='<div class="bg-gray-100 rounded-lg p-3 mb-4 mt-6"><h3 class="text-sm font-medium text-gray-700 mb-2">Source Status</h3><div class="text-xs space-y-1">';
    D.sourceStatus.forEach(s=>{
        if(s.status==='ok') h+='<p><span class="text-green-600">&#10004;</span> '+s.name+' ('+s.count+' email'+(s.count>1?'s':'')+')</p>';
        else if(s.status==='warn') h+='<p><span class="text-yellow-600">&#9888;</span> '+s.name+' &mdash; '+s.detail+'</p>';
        else h+='<p><span class="text-gray-400">&#10007;</span> '+s.name+' &mdash; no newsletter</p>';
    });
    h+='</div></div></div>';
    document.getElementById('app').innerHTML=h;
}

function updateCount(){
    const n=document.querySelectorAll('input[type="checkbox"]:checked').length;
    document.getElementById('barCount').textContent=n?n+' selected':'0 selected';
}

function exportSelected(){
    const D=JSON.parse(document.getElementById('digestData').textContent);
    const checked=document.querySelectorAll('input[type="checkbox"]:checked');
    if(!checked.length){alert('Select at least one article.');return;}
    const routes={'pharma-decipher':[],'hbr-review':[],'ai-articles':[]};
    checked.forEach(cb=>routes[cb.dataset.agent].push({title:cb.dataset.title,source:cb.dataset.source,url:cb.dataset.url,category:cb.dataset.category}));
    let t='\u{1F4CB} Daily Digest Export \u2014 '+D.shortDate+'\nSelected: '+checked.length+' articles\n\n'+'='.repeat(49)+'\n';
    ['pharma-decipher','hbr-review','ai-articles'].forEach(r=>{
        if(routes[r].length){
            t+='\n\u25B6 '+r.toUpperCase()+'\n'+'\u2500'.repeat(49)+'\n';
            routes[r].forEach(a=>{t+='\n['+a.category+'] '+a.title+'\nSource: '+a.source+'\n'+a.url+'\n';});
        }
    });
    t+='\n'+'='.repeat(49)+'\n\nRouting Summary:\n';
    t+='\u2022 pharma-decipher: '+routes['pharma-decipher'].length+' articles\n';
    t+='\u2022 hbr-review: '+routes['hbr-review'].length+' articles\n';
    t+='\u2022 ai-articles: '+routes['ai-articles'].length+' articles\n';
    document.getElementById('exportText').textContent=t;
    document.getElementById('exportModal').classList.remove('hidden');
}

function closeModal(){document.getElementById('exportModal').classList.add('hidden');}
function copyExport(){
    navigator.clipboard.writeText(document.getElementById('exportText').textContent).then(()=>{
        const b=document.getElementById('copyBtn');b.textContent='Copied!';
        setTimeout(()=>b.textContent='Copy to Clipboard',2000);
    });
}

render();
</script>
